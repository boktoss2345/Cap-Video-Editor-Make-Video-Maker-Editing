        // Update filter presets
        function updateFilterPresets(filter) {
            const presetsContainer = $('#filter-presets');
            let presets = [];
            
            switch (filter) {
                case 'brightness':
                    presets = [
                        { name: 'Dark', value: 50 },
                        { name: 'Normal', value: 100 },
                        { name: 'Bright', value: 150 }
                    ];
                    break;
                case 'contrast':
                    presets = [
                        { name: 'Low', value: 50 },
                        { name: 'Normal', value: 100 },
                        { name: 'High', value: 150 }
                    ];
                    break;
                case 'saturation':
                    presets = [
                        { name: 'B&W', value: 0 },
                        { name: 'Normal', value: 100 },
                        { name: 'Vivid', value: 150 }
                    ];
                    break;
                case 'blur':
                    presets = [
                        { name: 'None', value: 0 },
                        { name: 'Light', value: 5 },
                        { name: 'Strong', value: 15 }
                    ];
                    break;
                case 'vignette':
                    presets = [
                        { name: 'None', value: 0 },
                        { name: 'Light', value: 30 },
                        { name: 'Dark', value: 70 }
                    ];
                    break;
            }
            
            presetsContainer.innerHTML = '';
            presets.forEach(preset => {
                const btn = document.createElement('button');
                btn.className = 'filter-preset-btn';
                btn.textContent = preset.name;
                btn.addEventListener('click', () => {
                    saveStateForUndo();
                    state.filters[state.activeFilter] = preset.value;
                    $('#filter-value').value = preset.value;
                    $('#filter-value-display').textContent = preset.value;
                    renderFrame(state.currentTime);
                });
                presetsContainer.appendChild(btn);
            });
        }
        
        // Update filter value
        function updateFilterValue() {
            const value = parseInt($('#filter-value').value);
            $('#filter-value-display').textContent = value;
            
            saveStateForUndo();
            state.filters[state.activeFilter] = value;
            renderFrame(state.currentTime);
        }
        
        // Apply transition
        function applyTransition(transition) {
            state.transition = transition;
            state.transitionProgress = 0;
            
            toastMsg(`Transition: ${transition} applied`);
            
            // Animate transition
            let startTime = null;
            const duration = 1000; // 1 second
            
            function animateTransition(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                state.transitionProgress = Math.min(elapsed / duration, 1);
                
                renderFrame(state.currentTime);
                
                if (state.transitionProgress < 1) {
                    requestAnimationFrame(animateTransition);
                } else {
                    state.transition = null;
                    state.transitionProgress = 0;
                    renderFrame(state.currentTime);
                }
            }
            
            requestAnimationFrame(animateTransition);
        }
        
        // Canvas mouse handlers for overlay dragging
        function onCanvasMouseDown(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            // Check if clicking on an overlay
            let clickedOverlay = null;
            for (let i = state.overlays.length - 1; i >= 0; i--) {
                const o = state.overlays[i];
                let overlayWidth, overlayHeight;
                
                if (o.type === 'text') {
                    ctx.font = `${o.fontSize || 48}px ${o.fontFamily || 'Arial'}`;
                    const metrics = ctx.measureText(o.content || 'Text');
                    overlayWidth = metrics.width;
                    overlayHeight = (o.fontSize || 48) * 1.2;
                } else {
                    overlayWidth = o.size || 60;
                    overlayHeight = o.size || 60;
                }
                
                if (x >= o.x && x <= o.x + overlayWidth &&
                    y >= o.y && y <= o.y + overlayHeight) {
                    clickedOverlay = o;
                    break;
                }
            }
            
            if (clickedOverlay) {
                saveStateForUndo();
                state.selectedOverlayId = clickedOverlay.id;
                state.isDraggingOverlay = true;
                state.dragStartX = x - clickedOverlay.x;
                state.dragStartY = y - clickedOverlay.y;
                
                // Show appropriate properties panel
                if (clickedOverlay.type === 'text') {
                    $('#prop-text').style.display = 'block';
                    $('#prop-emoji').style.display = 'none';
                    $('#text-content').value = clickedOverlay.content;
                    $('#text-font').value = clickedOverlay.fontFamily || 'Arial';
                    $('#text-size').value = clickedOverlay.fontSize || 48;
                    $('#text-color').value = clickedOverlay.fontColor || '#000000';
                    $('#text-size-val').textContent = (clickedOverlay.fontSize || 48) + 'px';
                } else {
                    $('#prop-emoji').style.display = 'block';
                    $('#prop-text').style.display = 'none';
                    $('#emoji-size').value = clickedOverlay.size || 60;
                    $('#emoji-opacity').value = clickedOverlay.opacity || 100;
                }
            } else {
                state.selectedOverlayId = null;
                $('#prop-text').style.display = 'none';
                $('#prop-emoji').style.display = 'none';
            }
            
            renderFrame(state.currentTime);
        }
        
        function onCanvasMouseMove(e) {
            if (!state.isDraggingOverlay) return;
            
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            const selected = state.overlays.find(o => o.id === state.selectedOverlayId);
            if (selected) {
                selected.x = x - state.dragStartX;
                selected.y = y - state.dragStartY;
                renderFrame(state.currentTime);
            }
        }
        
        function onCanvasMouseUp() {
            state.isDraggingOverlay = false;
        }
        
        // Open export modal
        function openExportModal() {
            if (state.videoSources.length === 0) {
                toastMsg('Please import a video before exporting');
                return;
            }
            
            modalContainer.innerHTML = `
                <div class="modal-overlay" id="export-modal-overlay">
                    <div class="modal">
                        <h3>Export Video</h3>
                        <div class="prop-group">
                            <label>Format</label>
                            <select id="export-format">
                                <option value="webm">WebM</option>
                                <option value="mp4">MP4</option>
                            </select>
                        </div>
                        <div class="prop-group">
                            <label>Quality</label>
                            <select id="export-quality">
                                <option value="1">High</option>
                                <option value="0.7" selected>Medium</option>
                                <option value="0.4">Low</option>
                            </select>
                        </div>
                        <div class="btn-row">
                            <button class="tb-btn accent" id="export-start">Export</button>
                            <button class="tb-btn" id="close-export-modal">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            
            $('#export-start')?.addEventListener('click', () => {
                const format = $('#export-format').value;
                const quality = parseFloat($('#export-quality').value);
                exportVideo(format, quality);
                modalContainer.innerHTML = '';
            });
            
            $('#close-export-modal')?.addEventListener('click', () => {
                modalContainer.innerHTML = '';
            });
            
            $('#export-modal-overlay')?.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    modalContainer.innerHTML = '';
                }
            });
        }
        
        // Export video
        function exportVideo(format, quality) {
            toastMsg('Starting export...');
            
            // Create a MediaRecorder to capture the canvas
            const stream = mainCanvas.captureStream(30); // 30 FPS
            const mimeType = format === 'mp4' ? 'video/mp4' : 'video/webm';
            
            let mediaRecorder;
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 5000000 * quality
                });
            } catch (e) {
                // Fallback
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm',
                    videoBitsPerSecond: 5000000 * quality
                });
            }
            
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    chunks.push(e.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                const url = URL.createObjectURL(blob);
                
                // Download the file
                const a = document.createElement('a');
                a.href = url;
                a.download = `video-${Date.now()}.${format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                toastMsg('Export complete! Downloading...');
            };
            
            // Start recording
            mediaRecorder.start();
            
            // Play the video from trim start to trim end
            videoElement.currentTime = state.trimStart;
            state.isPlaying = false;
            btnPlay.textContent = '▶';
            
            if (state.animationFrameId) {
                cancelAnimationFrame(state.animationFrameId);
                state.animationFrameId = null;
            }
            
            // Render frames during export
            const exportStartTime = state.trimStart;
            const exportEndTime = state.trimEnd || state.duration;
            const exportDuration = exportEndTime - exportStartTime;
            const fps = 30;
            const frameInterval = 1000 / fps;
            let exportCurrentTime = exportStartTime;
            
            videoElement.currentTime = exportCurrentTime;
            
            function renderExportFrame() {
                if (exportCurrentTime >= exportEndTime) {
                    mediaRecorder.stop();
                    videoElement.pause();
                    return;
                }
                
                videoElement.currentTime = exportCurrentTime;
                
                // Wait for seek to complete
                videoElement.addEventListener('seeked', function onSeeked() {
                    videoElement.removeEventListener('seeked', onSeeked);
                    renderFrame(exportCurrentTime);
                    exportCurrentTime += 1 / fps;
                    
                    if (exportCurrentTime < exportEndTime) {
                        setTimeout(renderExportFrame, frameInterval);
                    } else {
                        mediaRecorder.stop();
                        videoElement.pause();
                    }
                });
            }
            
            // Start export after a short delay to ensure recording has started
            setTimeout(renderExportFrame, 500);
        }
        
        // Save project to file
        function saveProjectToFile() {
            const projectData = {
                version: '1.0',
                timestamp: Date.now(),
                videoSources: state.videoSources.map(s => ({
                    name: s.name,
                    url: s.url
                })),
                audioSources: state.audioSources.map(s => ({
                    name: s.name,
                    url: s.url
                })),
                currentVideoIndex: state.currentVideoIndex,
                overlays: state.overlays,
                filters: state.filters,
                trimStart: state.trimStart,
                trimEnd: state.trimEnd,
                rotation: state.rotation,
                flipH: state.flipH,
                flipV: state.flipV,
                speed: state.speed,
                musicVolume: state.musicVolume
            };
            
            const json = JSON.stringify(projectData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `video-project-${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            toastMsg('Project saved successfully!');
        }
        
        // Load project from file
        function loadProjectFromFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const projectData = JSON.parse(event.target.result);
                    
                    // Validate project data
                    if (!projectData.version) {
                        throw new Error('Invalid project file');
                    }
                    
                    saveStateForUndo();
                    
                    // Restore state
                    state.overlays = projectData.overlays || [];
                    state.filters = projectData.filters || state.filters;
                    state.trimStart = projectData.trimStart || 0;
                    state.trimEnd = projectData.trimEnd || null;
                    state.rotation = projectData.rotation || 0;
                    state.flipH = projectData.flipH || false;
                    state.flipV = projectData.flipV || false;
                    state.speed = projectData.speed || 1;
                    state.musicVolume = projectData.musicVolume || 0.5;
                    
                    // Restore video sources
                    if (projectData.videoSources && projectData.videoSources.length > 0) {
                        state.videoSources = projectData.videoSources.map(s => ({
                            file: null,
                            url: s.url,
                            duration: 0,
                            name: s.name
                        }));
                        state.currentVideoIndex = projectData.currentVideoIndex || 0;
                        loadVideoSource(state.currentVideoIndex);
                    }
                    
                    // Restore audio sources
                    if (projectData.audioSources && projectData.audioSources.length > 0) {
                        initAudioContext();
                        state.audioSources = projectData.audioSources.map(s => ({
                            file: null,
                            url: s.url,
                            name: s.name
                        }));
                        musicElement.src = state.audioSources[0].url;
                        $('#prop-music').style.display = 'block';
                    }
                    
                    videoElement.playbackRate = state.speed;
                    speedSelect.value = state.speed;
                    
                    if (state.musicGainNode) {
                        state.musicGainNode.gain.value = state.musicVolume;
                        $('#music-volume').value = state.musicVolume * 100;
                    }
                    
                    updateTimelineUI();
                    updateFilterUI();
                    renderFrame(state.currentTime);
                    toastMsg('Project loaded successfully!');
                } catch (error) {
                    console.error('Error loading project:', error);
                    toastMsg('Error loading project file');
                }
            };
            
            reader.readAsText(file);
            e.target.value = '';
        }
        
        // Update timeline UI
        function updateTimelineUI() {
            // Video track
            const videoTrack = $('#tl-video-track');
            videoTrack.querySelectorAll('.tl-clip').forEach(c => c.remove());
            state.videoSources.forEach((s, i) => {
                const clip = document.createElement('span');
                clip.className = 'tl-clip video-clip';
                clip.textContent = s.name;
                clip.title = s.name;
                clip.addEventListener('click', () => {
                    loadVideoSource(i);
                });
                
                const removeBtn = document.createElement('span');
                removeBtn.className = 'clip-remove';
                removeBtn.textContent = '×';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveStateForUndo();
                    URL.revokeObjectURL(s.url);
                    state.videoSources.splice(i, 1);
                    if (state.videoSources.length > 0) {
                        loadVideoSource(0);
                    } else {
                        videoElement.src = '';
                        videoElement.pause();
                        state.isPlaying = false;
                        btnPlay.textContent = '▶';
                        seekBar.value = 0;
                    }
                    updateTimelineUI();
                    renderFrame(0);
                });
                
                clip.appendChild(removeBtn);
                videoTrack.appendChild(clip);
            });
            
            // Audio track
            const audioTrack = $('#tl-audio-track');
            audioTrack.querySelectorAll('.tl-clip').forEach(c => c.remove());
            state.audioSources.forEach((s, i) => {
                const clip = document.createElement('span');
                clip.className = 'tl-clip audio-clip';
                clip.textContent = s.name;
                clip.title = s.name;
                clip.addEventListener('click', () => {
                    initAudioContext();
                    musicElement.src = s.url;
                    musicElement.play().catch(() => {});
                    $('#prop-music').style.display = 'block';
                });
                
                const removeBtn = document.createElement('span');
                removeBtn.className = 'clip-remove';
                removeBtn.textContent = '×';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    URL.revokeObjectURL(s.url);
                    state.audioSources.splice(i, 1);
                    if (state.audioSources.length === 0) {
                        musicElement.pause();
                        musicElement.src = '';
                        $('#prop-music').style.display = 'none';
                    }
                    updateTimelineUI();
                });
                
                clip.appendChild(removeBtn);
                audioTrack.appendChild(clip);
            });
            
            // Text/Overlay track
            const textTrack = $('#tl-text-track');
            textTrack.querySelectorAll('.tl-clip').forEach(c => c.remove());
            state.overlays.forEach((o, i) => {
                const clip = document.createElement('span');
                clip.className = 'tl-clip text-clip';
                if (o.type === 'emoji' || o.type === 'sticker') {
                    clip.classList.add('emoji-clip');
                }
                clip.textContent = o.content || 'Text';
                clip.title = `${o.type}: ${o.content || 'Text'}`;
                clip.addEventListener('click', () => {
                    state.selectedOverlayId = o.id;
                    if (o.type === 'text') {
                        $('#prop-text').style.display = 'block';
                        $('#prop-emoji').style.display = 'none';
                        $('#text-content').value = o.content;
                        $('#text-font').value = o.fontFamily || 'Arial';
                        $('#text-size').value = o.fontSize || 48;
                        $('#text-color').value = o.fontColor || '#000000';
                        $('#text-size-val').textContent = (o.fontSize || 48) + 'px';
                    } else {
                        $('#prop-emoji').style.display = 'block';
                        $('#prop-text').style.display = 'none';
                        $('#emoji-size').value = o.size || 60;
                        $('#emoji-opacity').value = o.opacity || 100;
                    }
                    renderFrame(state.currentTime);
                });
                
                const removeBtn = document.createElement('span');
                removeBtn.className = 'clip-remove';
                removeBtn.textContent = '×';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveStateForUndo();
                    state.overlays = state.overlays.filter(ov => ov.id !== o.id);
                    if (state.selectedOverlayId === o.id) {
                        state.selectedOverlayId = null;
                        $('#prop-text').style.display = 'none';
                        $('#prop-emoji').style.display = 'none';
                    }
                    updateTimelineUI();
                    renderFrame(state.currentTime);
                });
                
                clip.appendChild(removeBtn);
                textTrack.appendChild(clip);
            });
        }
        
        // Toast message
        function toastMsg(m) {
            toast.textContent = m;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // Initialize the application
        updateCanvasSize();
        renderFrame(0);
        updateTimeDisplay();
        updateFilterUI();
        init();
    })();
</script>
